<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Forest Green Background -->
  <rect width="512" height="512" rx="112" fill="#1E4D2B"/>
  
  <!-- Minimalist Kangaroo in Beige -->
  <g fill="#F5F5DC">
    <!-- Head & Ears -->
    <circle cx="280" cy="160" r="45"/>
    <ellipse cx="260" cy="130" rx="12" ry="30" transform="rotate(-25 260 130)"/>
    <ellipse cx="300" cy="130" rx="12" ry="30" transform="rotate(25 300 130)"/>
    
    <!-- Body -->
    <ellipse cx="280" cy="280" rx="75" ry="100"/>
    
    <!-- Tail (curved) -->
    <path d="M 210 300 Q 140 320, 120 380 L 135 385 Q 155 330, 220 310 Z"/>
    
    <!-- Front arm -->
    <ellipse cx="230" cy="250" rx="10" ry="40" transform="rotate(-40 230 250)"/>
    
    <!-- Back legs (powerful) -->
    <ellipse cx="260" cy="360" rx="22" ry="50" transform="rotate(-10 260 360)"/>
    <ellipse cx="300" cy="360" rx="22" ry="50" transform="rotate(10 300 360)"/>
    
    <!-- Large feet -->
    <ellipse cx="250" cy="405" rx="30" ry="15"/>
    <ellipse cx="310" cy="405" rx="30" ry="15"/>
    
    <!-- Eye -->
    <circle cx="270" cy="155" r="5" fill="#1E4D2B"/>
  </g>
</svg>
